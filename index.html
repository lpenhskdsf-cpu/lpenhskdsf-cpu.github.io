<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma première page</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin-top:100px;
}
button{
    font-size:20px;
    padding:15px 30px;
}
</style>

<!-- =========================
     CONFIG EMAILJS (ICI)
========================= -->
<script>
const EMAILJS_PUBLIC_KEY = "la5JMWYpdYlxk6b3a";
const EMAILJS_SERVICE_ID = "service_0vmgw0q";
const EMAILJS_TEMPLATE_ID = "template_kiegdv7";
const EMAIL_TO = "djomac25@gmail.com";
</script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
  emailjs.init(EMAILJS_PUBLIC_KEY);
</script>

</head>

<body>

<h1>Bienvenue !</h1>

<button id="btn">Clique ici</button>

<p>Nombre de clics :</p>
<h2 id="compteur">0</h2>

<script>

let compteur = localStorage.getItem("clics") || 0;
document.getElementById("compteur").textContent = compteur;

document.getElementById("btn").onclick = function(){

    // incrément compteur
    compteur++;
    document.getElementById("compteur").textContent = compteur;
    localStorage.setItem("clics", compteur);

    // envoi email
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: EMAIL_TO,
        message: "Un clic a été effectué. Total : " + compteur
    })
    .then(() => {
        console.log("Email envoyé ✔️");
    })
    .catch((error) => {
        console.log("Erreur ❌", error);
    });

}

</script>

</body>
</html>
