<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page interactive</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(120deg, #e0f2ff, #ffffff);
    color: #333;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background: white;
    padding:30px;
    border-radius:16px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
}

input{
    padding:10px;
    width:90%;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#2196f3;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#1976d2;
}

.btn-yes{ background:#4caf50; }
.btn-no{ background:#f44336; }

.btn-yes:hover{ background:#3e8e41; }
.btn-no:hover{ background:#d32f2f; }

button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}

.hidden{ display:none; }

#error{
    color:red;
    margin-top:10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

const CONFIG = {
    emailjs: {
        publicKey: "la5JMWYpdYlxk6b3a",
        serviceID: "service_0vmgw0q",
        templateID: "template_kiegdv7"
    },
    security: {
        password: "0412"
    },
    email: {
        to: "joevin.mahon@gmail.com"
    }
};

emailjs.init(CONFIG.emailjs.publicKey);

document.addEventListener("DOMContentLoaded", () => {

    const dateInput = document.getElementById("dateChoice");
    const timeInput = document.getElementById("timeChoice");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");

    const startBlocked = "2026-07-30";
    const endBlocked = "2026-08-21";

    // reset
    dateInput.value = "";
    timeInput.value = "";

    // validation
    function checkFormValidity(){

        const date = dateInput.value;
        const time = timeInput.value;

        let valid = true;

        if(!date || !time) valid = false;

        if(date >= startBlocked && date <= endBlocked) valid = false;

        yesBtn.disabled = !valid;
        noBtn.disabled = !valid;

        // reset position NON si invalide
        if(!valid){
            noBtn.style.position = "relative";
            noBtn.style.left = "0px";
            noBtn.style.top = "0px";
        }
    }

    dateInput.addEventListener("input", checkFormValidity);
    timeInput.addEventListener("input", checkFormValidity);

    checkFormValidity();

    // LOGIN
    window.checkPassword = function(){

        const input = document.getElementById("password").value;
        const error = document.getElementById("error");

        if(input === CONFIG.security.password){

            error.textContent = "";
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("questionBox").classList.remove("hidden");

        } else {
            error.textContent = "Mot de passe incorrect";
        }
    }

    document.addEventListener("keydown", (e)=>{
        if(e.key === "Enter") checkPassword();
    });

    // REPONSE
    window.answer = function(choice){

        const date = dateInput.value;
        const time = timeInput.value;

        document.getElementById("questionBox").classList.add("hidden");
        document.getElementById("resultBox").classList.remove("hidden");

        document.getElementById("resultText").innerText =
            "Choix : " + choice +
            "\nDate : " + (date || "non définie") +
            "\nHeure : " + (time || "non définie");

        emailjs.send(
            CONFIG.emailjs.serviceID,
            CONFIG.emailjs.templateID,
            {
                to_email: CONFIG.email.to,
                message:
                    "Choix: " + choice +
                    " | Date: " + date +
                    " | Heure: " + time +
                    " | Lieu: Place Dauphine, Paris"
            }
        );

        setTimeout(() => {
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:40vh;'>Merci ❤️</h2>";
        }, 2000);
    }

    // NON qui fuit au hover (UNIQUEMENT si actif)
    window.moveNo = function(){

        if(noBtn.disabled) return;

        const box = document.getElementById("questionBox");

        const maxX = box.clientWidth - 100;
        const maxY = box.clientHeight - 60;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.position = "absolute";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

});

</script>

</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Accès protégé</h2>
    <input type="password" id="password" placeholder="Date d'anniversaire (JJMM)">
    <button onclick="checkPassword()">Entrer</button>
    <div id="error"></div>
</div>

<!-- QUESTION -->
<div class="card hidden" id="questionBox">
    <h2>Une dernière fois.<br>Ou une première, autrement.</h2>

    <p>Choisis le jour et l'heure :</p>

    <input type="date" id="dateChoice">
    <input type="time" id="timeChoice">

    <p style="margin-top:10px;">
        Lieu : <b>Place Dauphine, Paris</b>
    </p>

    <button class="btn-yes" id="yesBtn" onclick="answer('OUI')" disabled>
        OUI
    </button>

    <button class="btn-no" id="noBtn"
        onmouseover="moveNo()"
        onclick="moveNo()"
        disabled>
        NON
    </button>
</div>

<!-- RESULT -->
<div class="card hidden" id="resultBox">
    <h2 id="resultText"></h2>
</div>

</body>
</html>
