<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page interactive</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(120deg, #e0f2ff, #ffffff);
    color: #333;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background: white;
    padding:30px;
    border-radius:16px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
}

input{
    padding:10px;
    width:90%;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#2196f3;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#1976d2;
}

.btn-yes{ background:#4caf50; }
.btn-no{ background:#f44336; }

.btn-yes:hover{ background:#3e8e41; }
.btn-no:hover{ background:#d32f2f; }

.hidden{ display:none; }

#error{
    color:red;
    margin-top:10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

//////////////////////////////
// CONFIG
//////////////////////////////
const CONFIG = {
    emailjs: {
        publicKey: "la5JMWYpdYlxk6b3a",
        serviceID: "service_0vmgw0q",
        templateID: "template_kiegdv7"
    },
    security: {
        password: "0412"
    },
    email: {
        to: "joevin.mahon@gmail.com"
    }
};

emailjs.init(CONFIG.emailjs.publicKey);

document.addEventListener("DOMContentLoaded", () => {
    
    const dateInput = document.getElementById("dateChoice");
    const timeInput = document.getElementById("timeChoice");

    // sécurité : vérifier que les éléments existent
    if(dateInput) dateInput.value = "";
    if(timeInput) timeInput.value = "";

    const dateInput = document.getElementById("dateChoice");

    // bornes interdites (format ISO correct)
    const startBlocked = "2026-07-30";
    const endBlocked = "2026-08-21";
    
    // min/max global
    dateInput.min = "2026-01-01";
    dateInput.max = "2026-12-31";
    
    dateInput.addEventListener("input", () => {
    
        const selected = dateInput.value;
    
        if(selected >= startBlocked && selected <= endBlocked){
            alert("Cette période n'est pas disponible ❌");
            dateInput.value = "";
        }
    });

    //////////////////////////
    // LOGIN
    //////////////////////////
    window.checkPassword = function(){

        const input = document.getElementById("password").value;
        const error = document.getElementById("error");

        if(input === CONFIG.security.password){

            error.textContent = "";
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("questionBox").classList.remove("hidden");

        } else {
            error.textContent = "Mot de passe incorrect";
        }
    }

    //////////////////////////
    // ENTER clavier
    //////////////////////////
    document.addEventListener("keydown", (e)=>{
        if(e.key === "Enter") checkPassword();
    });

    //////////////////////////
    // REPONSE
    //////////////////////////
    window.answer = function(choice){
    
        const date = document.getElementById("dateChoice").value;
        const time = document.getElementById("timeChoice").value;
    
        document.getElementById("questionBox").classList.add("hidden");
        document.getElementById("resultBox").classList.remove("hidden");
    
        document.getElementById("resultText").innerText =
            "Choix : " + choice +
            "\nDate : " + (date || "non définie") +
            "\nHeure : " + (time || "non définie");
    
        emailjs.send(
            CONFIG.emailjs.serviceID,
            CONFIG.emailjs.templateID,
            {
                to_email: CONFIG.email.to,
                message:
                    "Choix: " + choice +
                    " | Date: " + date +
                    " | Heure: " + time +
                    " | Lieu: Place Dauphine, Paris"
            }
        );

       setTimeout(() => {
        window.location.href = "about:blank";
        }, 2000);
        
    }

    //////////////////////////
    // BOUTON NON QUI FUIT
    //////////////////////////
    window.moveNo = function(){

        const btn = document.getElementById("noBtn");
        const box = document.getElementById("questionBox");

        const maxX = box.clientWidth - 100;
        const maxY = box.clientHeight - 60;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        btn.style.position = "absolute";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

});

</script>

</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Accès protégé</h2>
    <input type="password" id="password" placeholder="Votre Date D'anniversaire (JJ/MM)">
    <button onclick="checkPassword()">Entrer</button>
    <div id="error"></div>
</div>

<!-- QUESTION -->
<div class="card hidden" id="questionBox">
    <h2>Une dernière fois.<br>Ou une première, autrement.</h2>

    <p>Choisis le jour et l'heure :</p>

    <input type="date" id="dateChoice">
    <input type="time" id="timeChoice">

    <p style="margin-top:10px;">
        Lieu : <b>Place Dauphine, Paris</b>
    </p>

    <button class="btn-yes" onclick="answer('OUI')">OUI</button>

    <button class="btn-no" id="noBtn"
        onmouseover="moveNo()"
        onclick="moveNo()">
        NON
    </button>
</div>

<!-- RESULT -->
<div class="card hidden" id="resultBox">
    <h2 id="resultText"></h2>
</div>

</body>
</html>
