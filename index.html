<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page interactive</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(120deg, #1e1e2f, #2b2b45);
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background: rgba(255,255,255,0.08);
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input{
    padding:10px;
    width:90%;
    margin-top:10px;
    border-radius:8px;
    border:none;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn-yes{ background:#4caf50; color:white; }
.btn-no{ background:#f44336; color:white; }

.hidden{ display:none; }

.fade{
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
//////////////////////////////
// 🔧 CONFIG CENTRALISÉE
//////////////////////////////
const CONFIG = {
    emailjs: {
        publicKey: "la5JMWYpdYlxk6b3a",
        serviceID: "service_0vmgw0q",
        templateID: "template_kiegdv7"
    },

    security: {
        password: "0412"
    },

    email: {
        to: "joevin.mahon@gmail.com"
    }
};

// init EmailJS
emailjs.init(CONFIG.emailjs.publicKey);

document.addEventListener("DOMContentLoaded", () => {

    const loginBox = document.getElementById("loginBox");
    const questionBox = document.getElementById("questionBox");
    const resultBox = document.getElementById("resultBox");

    const passwordInput = document.getElementById("password");
    const errorText = document.getElementById("error");

    //////////////////////////
    // LOGIN
    //////////////////////////
    window.checkPassword = function(){

        const input = passwordInput.value;

        if(input === CONFIG.security.password){

            errorText.textContent = "";

            loginBox.classList.add("hidden");
            questionBox.classList.remove("hidden");

        } else {
            errorText.textContent = "Mot de passe incorrect";
        }
    }

    //////////////////////////
    // ENTER clavier
    //////////////////////////
    document.addEventListener("keydown", function(event){
        if(event.key === "Enter"){
            checkPassword();
        }
    });

    //////////////////////////
    // ANSWER OUI / NON
    //////////////////////////
    window.answer = function(choice){

        questionBox.classList.add("hidden");
        resultBox.classList.remove("hidden");

        document.getElementById("resultText").innerText = "Choix : " + choice;

        emailjs.send(
            CONFIG.emailjs.serviceID,
            CONFIG.emailjs.templateID,
            {
                to_email: CONFIG.email.to,
                message: "Mot de passe validé + réponse : " + choice
            }
        )
        .then(() => console.log("Email envoyé ✔️"))
        .catch(err => console.log("Erreur ❌", err));
    }

});

</script>

</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Accès protégé</h2>
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="checkPassword()">Entrer</button>
    <p id="error" style="color:#ff6b6b;"></p>
</div>

<!-- QUESTION -->
<div class="card hidden" id="questionBox">
    <h2>Une question</h2>
    <p>Veux-tu continuer ?</p>

    <button class="btn-yes" onclick="answer('OUI')">OUI</button>
    <button class="btn-no" onclick="answer('NON')">NON</button>
</div>

<!-- RESULT -->
<div class="card hidden" id="resultBox">
    <h2 id="resultText"></h2>
</div>

</body>
</html>
