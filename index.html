<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page interactive</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(120deg, #e0f2ff, #ffffff);
    color: #333;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background: white;
    padding:30px;
    border-radius:16px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
    padding:10px;
    width:90%;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
    outline:none;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#2196f3;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#1976d2;
}

.btn-yes{ background:#4caf50; }
.btn-no{ background:#f44336; }

.btn-yes:hover{ background:#3e8e41; }
.btn-no:hover{ background:#d32f2f; }

.hidden{ display:none; }

.fade{
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
const CONFIG = {
    emailjs: {
        publicKey: "la5JMWYpdYlxk6b3a",
        serviceID: "service_0vmgw0q",
        templateID: "template_kiegdv7"
    },
    security: {
        password: "0412"
    },
    email: {
        to: "joevin.mahon@gmail.com"
    }
};

emailjs.init(CONFIG.emailjs.publicKey);

document.addEventListener("DOMContentLoaded", () => {

    window.checkPassword = function(){

        const input = document.getElementById("password").value;
        const error = document.getElementById("error");

        if(input === CONFIG.security.password){
            error.textContent = "";
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("questionBox").classList.remove("hidden");
        } else {
            error.textContent = "Mot de passe incorrect";
        }
    }

    document.addEventListener("keydown", (e)=>{
        if(e.key === "Enter") checkPassword();
    });

    window.answer = function(choice){

        document.getElementById("questionBox").classList.add("hidden");
        document.getElementById("resultBox").classList.remove("hidden");

        document.getElementById("resultText").innerText = "Choix : " + choice;

        emailjs.send(
            CONFIG.emailjs.serviceID,
            CONFIG.emailjs.templateID,
            {
                to_email: CONFIG.email.to,
                message: "Mot de passe validé + réponse : " + choice
            }
        );
    }

});
</script>

</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Accès protégé</h2>
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="checkPassword()">Entrer</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- QUESTION -->
<div class="card hidden" id="questionBox">
    <h2>Une question</h2>
    <p>Veux-tu continuer ?</p>

    <button class="btn-yes" onclick="answer('OUI')">OUI</button>
    <button class="btn-no" onclick="answer('NON')">NON</button>
</div>

<!-- RESULT -->
<div class="card hidden" id="resultBox">
    <h2 id="resultText"></h2>
</div>

</body>
</html>
